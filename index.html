<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>1,000+days of rasonance AR Experience</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <script>
      // ▼▼▼ グローバル変数の設定 ▼▼▼
      window.iconPlay = '<svg viewBox="0 0 24 24"><path d="M7 4V20L19 12L7 4Z"></path></svg>';
      window.iconPause = '<svg viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16" rx="1"></rect><rect x="14" y="4" width="4" height="16" rx="1"></rect></svg>';
      
      let savedPlayState = sessionStorage.getItem('globalIsPlaying');
      window.shouldPlay = savedPlayState === null ? true : (savedPlayState === 'true');
      window.activeMedia = null;

      window.setGlobalPlayState = function(play) {
        window.shouldPlay = play;
        sessionStorage.setItem('globalIsPlaying', play ? 'true' : 'false');
        document.querySelectorAll('.play-pause-btn').forEach(btn => btn.innerHTML = play ? window.iconPause : window.iconPlay);
      };

      window.addEventListener('DOMContentLoaded', () => {
        document.querySelectorAll('.play-pause-btn').forEach(btn => btn.innerHTML = window.shouldPlay ? window.iconPause : window.iconPlay);
      });

      // ▼▼▼ ジェスチャー検出 ▼▼▼
      AFRAME.registerComponent("gesture-detector", {
        init: function() {
          this.internalState = { previousState: null };
          this.emitGestureEvent = this.emitGestureEvent.bind(this);
          window.addEventListener("touchstart", this.emitGestureEvent);
          window.addEventListener("touchend", this.emitGestureEvent);
          window.addEventListener("touchmove", this.emitGestureEvent);
        },
        emitGestureEvent: function(event) {
          const currentState = this.getTouchState(event);
          const previousState = this.internalState.previousState;
          
          if (previousState && currentState && currentState.touchCount === previousState.touchCount) {
            const eventDetail = {
              positionChange: { 
                x: currentState.position.x - previousState.position.x, 
                y: currentState.position.y - previousState.position.y 
              }
            };
            if (currentState.touchCount === 1) {
              this.el.emit("onefingermove", eventDetail);
            } else if (currentState.touchCount === 2) {
              eventDetail.spreadChange = currentState.spread - previousState.spread;
              eventDetail.spread = currentState.spread;
              this.el.emit("twofingermove", eventDetail);
            }
          }
          this.internalState.previousState = currentState;
        },
        getTouchState: function(event) {
          if (event.touches.length === 0) return null;
          if (event.touches.length === 1) {
            return { touchCount: 1, position: { x: event.touches[0].pageX, y: event.touches[0].pageY } };
          }
          if (event.touches.length === 2) {
            const spread = Math.hypot(
              event.touches[0].pageX - event.touches[1].pageX, 
              event.touches[0].pageY - event.touches[1].pageY
            );
            return { 
              touchCount: 2, 
              position: { 
                x: (event.touches[0].pageX + event.touches[1].pageX) / 2, 
                y: (event.touches[0].pageY + event.touches[1].pageY) / 2 
              }, spread: spread 
            };
          }
          return null;
        }
      });

      // ▼▼▼ スライドショーコンポーネント ▼▼▼
      AFRAME.registerComponent('auto-slideshow', {
        schema: { 
          prefix: { type: 'string' },
          interval: { type: 'number', default: 3500 },
          targetAspectRatio: { type: 'number', default: 1.65 } 
        },
        init: function () {
          const imgs = Array.from(document.querySelectorAll(`img[id^="${this.data.prefix}-"]`));
          
          imgs.sort((a, b) => {
            const numA = parseInt(a.id.replace(`${this.data.prefix}-`, ''), 10);
            const numB = parseInt(b.id.replace(`${this.data.prefix}-`, ''), 10);
            return numA - numB;
          });
          
          this.srcArray = imgs.map(img => '#' + img.id);
          this.storageKey = 'slide_index_' + this.el.id;
          const savedIndex = sessionStorage.getItem(this.storageKey);
          this.index = savedIndex !== null ? parseInt(savedIndex, 10) : 0;
          
          if (this.index >= this.srcArray.length) { this.index = 0; }
          
          if (this.srcArray.length > 0) {
            this.el.setAttribute('src', this.srcArray[this.index]);
          }
          this.el.setAttribute('material', { shader: 'flat', transparent: true, opacity: 1 });
          
          this.timer = null;
          this.isPlaying = false;
          this.isAnimating = false; 
          this.scaleFactor = 1.0;
          this.offsetX = 0;
          this.offsetY = 0;
          
          this.el.sceneEl.addEventListener('twofingermove', this.handleZoom.bind(this));
          this.el.sceneEl.addEventListener('onefingermove', this.handlePan.bind(this));
          
          if (this.srcArray.length > 0) {
            const img = document.querySelector(this.srcArray[this.index]);
            if (img.complete) { this.adjustSize(img); } 
            else { img.onload = () => this.adjustSize(img); }
          }
        },
        handleZoom: function(e) {
            if (window.activeSlideshowComponent !== this) return;
            const prevSpread = e.detail.spread - e.detail.spreadChange;
            if (prevSpread === 0) return;
            const oldRepeat = 1 / this.scaleFactor;
            this.scaleFactor *= (e.detail.spread / prevSpread);
            this.scaleFactor = Math.min(Math.max(this.scaleFactor, 1.0), 4.0); 
            const newRepeat = 1 / this.scaleFactor;
            const diff = oldRepeat - newRepeat;
            this.offsetX += diff / 2;
            this.offsetY += diff / 2;
            this.clampOffset();
            this.updateMaterial();
        },
        handlePan: function(e) {
            if (window.activeSlideshowComponent !== this || this.scaleFactor <= 1.0) return;
            const speed = 1.2; 
            const dx = (e.detail.positionChange.x / window.innerWidth) * speed;
            const dy = (e.detail.positionChange.y / window.innerHeight) * speed;
            this.offsetX -= dx / this.scaleFactor;
            this.offsetY += dy / this.scaleFactor;
            this.clampOffset();
            this.updateMaterial();
        },
        clampOffset: function() {
            const repeat = 1 / this.scaleFactor;
            const maxOffset = 1.0 - repeat;
            this.offsetX = Math.min(Math.max(this.offsetX, 0), maxOffset);
            this.offsetY = Math.min(Math.max(this.offsetY, 0), maxOffset);
        },
        updateMaterial: function() {
            const repeat = 1 / this.scaleFactor;
            this.el.setAttribute('material', 'repeat', `${repeat} ${repeat}`);
            this.el.setAttribute('material', 'offset', `${this.offsetX} ${this.offsetY}`);
        },
        resetZoom: function() {
            this.scaleFactor = 1.0;
            this.offsetX = 0;
            this.offsetY = 0;
            this.updateMaterial();
        },
        adjustSize: function(img) {
          const w = img.naturalWidth;
          const h = img.naturalHeight;
          if (!w || !h) return; 

          const imgRatio = w / h;
          const targetRatio = this.data.targetAspectRatio; 

          if (imgRatio > targetRatio) {
            this.el.setAttribute('width', 1.0);
            this.el.setAttribute('height', 1.0 / imgRatio);
          } else {
            const targetHeight = 1.0 / targetRatio;
            this.el.setAttribute('height', targetHeight);
            this.el.setAttribute('width', targetHeight * imgRatio);
          }
        },
        startSlide: function() {
          if (this.timer || this.srcArray.length <= 1) return;
          this.isPlaying = true;
          this.timer = setInterval(() => { this.changeSlide(1); }, this.data.interval);
        },
        stopSlide: function() {
          if (this.timer) clearInterval(this.timer);
          this.timer = null;
          this.isPlaying = false;
        },
        changeSlide: function (dir) {
          if (this.isAnimating || this.srcArray.length <= 1) return;
          this.isAnimating = true;
          
          if (this.isPlaying) {
            clearInterval(this.timer);
            this.timer = setInterval(() => { this.changeSlide(1); }, this.data.interval);
          }

          const el = this.el;
          el.setAttribute('animation', { property: 'material.opacity', from: 1, to: 0, dur: 400, easing: 'easeInOutQuad' });
          
          setTimeout(() => {
            this.resetZoom(); 
            this.index = (this.index + dir + this.srcArray.length) % this.srcArray.length;
            sessionStorage.setItem(this.storageKey, this.index); 
            
            el.setAttribute('src', this.srcArray[this.index]);
            
            const img = document.querySelector(this.srcArray[this.index]);
            if(img.complete) { this.adjustSize(img); } 
            else { img.onload = () => this.adjustSize(img); }
            
            el.removeAttribute('animation');
            el.setAttribute('animation', { property: 'material.opacity', from: 0, to: 1, dur: 400, easing: 'easeInOutQuad' });
            
            setTimeout(() => { this.isAnimating = false; }, 400); 
          }, 400);
        }
      });

      // ▼▼▼ ARターゲット制御コンポーネント (エラー防止の要) ▼▼▼
      AFRAME.registerComponent('target-handler', {
        schema: {
          type: { type: 'string' },
          targetId: { type: 'string', default: '' }
        },
        init: function() {
          this.el.addEventListener('targetFound', () => {
            document.querySelectorAll('.scan-guide').forEach(g => g.style.opacity = 0); 
            document.querySelectorAll('.controls-panel').forEach(p => p.classList.add('active')); 
            
            if (this.data.type === 'youtube') {
              window.activeMedia = { type: 'youtube' };
              document.getElementById('youtube-popup').style.display = 'block';
              if (window.shouldPlay) {
                const yt = document.getElementById('yt-player');
                if (yt && yt.contentWindow) yt.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
              }
            } else if (this.data.type === 'slideshow') {
              const contentEl = document.getElementById(this.data.targetId);
              if (contentEl && contentEl.components['auto-slideshow']) {
                const comp = contentEl.components['auto-slideshow'];
                window.activeMedia = { type: 'slideshow', instance: comp };
                if (window.shouldPlay) comp.startSlide();
              }
            }
            window.setGlobalPlayState(window.shouldPlay);
          });

          this.el.addEventListener('targetLost', () => {
            document.querySelectorAll('.scan-guide').forEach(g => g.style.opacity = 1); 
            document.querySelectorAll('.controls-panel').forEach(p => p.classList.remove('active')); 
            
            if (this.data.type === 'youtube') {
              document.getElementById('youtube-popup').style.display = 'none';
              const yt = document.getElementById('yt-player');
              if (yt && yt.contentWindow) yt.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*');
            } else if (this.data.type === 'slideshow') {
              const contentEl = document.getElementById(this.data.targetId);
              if (contentEl && contentEl.components['auto-slideshow']) {
                contentEl.components['auto-slideshow'].stopSlide();
              }
            }
            window.activeMedia = null;
          });
        }
      });

      // グローバルボタン操作
      window.globalPrev = function() {
        if (window.activeMedia && window.activeMedia.type === 'slideshow') {
          window.activeMedia.instance.changeSlide(-1);
        }
      };
      
      window.globalNext = function() {
        if (window.activeMedia && window.activeMedia.type === 'slideshow') {
          window.activeMedia.instance.changeSlide(1);
        }
      };
      
      window.globalTogglePlay = function() {
        if (!window.activeMedia) return;
        
        if (window.activeMedia.type === 'slideshow') {
          if (window.activeMedia.instance.isPlaying) {
            window.activeMedia.instance.stopSlide();
            window.setGlobalPlayState(false);
          } else {
            window.activeMedia.instance.startSlide();
            window.setGlobalPlayState(true);
          }
        } else if (window.activeMedia.type === 'youtube') {
          const yt = document.getElementById('yt-player');
          if (window.shouldPlay) {
            if (yt && yt.contentWindow) yt.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*');
            window.setGlobalPlayState(false);
          } else {
            if (yt && yt.contentWindow) yt.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
            window.setGlobalPlayState(true);
          }
        }
      };

      // 横向き対策：ARエンジンの再構築
      window.addEventListener('orientationchange', () => {
        const loadingDiv = document.getElementById('loading');
        const loadingText = document.getElementById('loading-text');
        if(loadingDiv && loadingText) {
            loadingDiv.style.display = 'flex';
            loadingDiv.style.opacity = '1';
            loadingText.innerText = "ADJUSTING CAMERA...";
        }
        setTimeout(() => { window.location.reload(); }, 600);
      });
    </script>

    <style>
      html, body { 
        margin: 0; padding: 0; width: 100%; height: 100%; 
        overflow: hidden; position: fixed; 
        font-family: "Yu Mincho", "Hiragino Mincho ProN", serif; 
        background: #000; 
      }
      
      #camera-frame {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        pointer-events: none; z-index: 7999; box-sizing: border-box;
        padding: 24px; 
        background: radial-gradient(circle, rgba(58,58,58,0.9) 0%, rgba(0,0,0,1) 100%);
        -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
      }
      #camera-vignette {
        position: fixed; top: 24px; left: 24px; right: 24px; bottom: 24px;
        box-shadow: inset 0 0 100px rgba(0,0,0,0.9);
        pointer-events: none; z-index: 7998;
      }
      .corner { position: absolute; width: 30px; height: 30px; border-color: rgba(255,255,255,0.4); border-style: solid; }
      .top-left { top: 40px; left: 40px; border-width: 1px 0 0 1px; }
      .top-right { top: 40px; right: 40px; border-width: 1px 1px 0 0; }
      .bottom-left { bottom: 40px; left: 40px; border-width: 0 0 1px 1px; }
      .bottom-right { bottom: 40px; right: 40px; border-width: 0 1px 1px 0; }

      #loading { 
        position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
        background: radial-gradient(circle, #2a2a2a 0%, #000 100%); 
        z-index: 99999; display: flex; flex-direction: column; 
        justify-content: center; align-items: center; transition: opacity 0.5s ease-out; 
      }
      .loader { 
        width: 40px; height: 40px; border: 1px solid rgba(255, 255, 255, 0.1); 
        border-top: 1px solid #fff; border-radius: 50%; 
        animation: spin 1s cubic-bezier(0.4, 0, 0.2, 1) infinite; 
      }
      #loading-text { margin-top: 25px; color: #fff; font-size: 11px; letter-spacing: 4px; font-weight: 300; opacity: 0.8; }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

      .ui-layer { position: fixed; inset: 0; pointer-events: none; z-index: 9000; }
      .scan-guide { 
        position: absolute; color: rgba(255,255,255,0.9); font-size: 13px; letter-spacing: 2px; 
        background: rgba(0,0,0,0.5); padding: 12px 24px; border-radius: 30px;
        backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.1);
        transition: opacity 0.5s ease; white-space: nowrap;
      }
      .controls-panel {
        position: absolute; display: flex; align-items: center; gap: 20px;
        background: rgba(20, 20, 20, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.15);
        border-radius: 40px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        opacity: 0; pointer-events: none; transition: opacity 0.5s ease, transform 0.5s ease;
      }
      .controls-panel.active { opacity: 1; pointer-events: auto; }
      .ctrl-btn { background: none; border: none; outline: none; cursor: pointer; padding: 5px; display: flex; align-items: center; justify-content: center; opacity: 0.8; transition: opacity 0.2s; }
      .ctrl-btn:active { opacity: 0.4; }
      .ctrl-btn svg { width: 22px; height: 22px; fill: white; }
      .ctrl-btn-stroke svg { fill: none; stroke: white; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      
      .footer-frame { position: absolute; pointer-events: auto; }
      .footer-text { color: #fff; font-size: 15px; letter-spacing: 3px; text-shadow: 0 2px 6px rgba(0,0,0,0.8); }
      .footer-frame a { text-decoration: none; }

      /* ▼▼▼ YouTubeプレーヤーのポップアップ用スタイル ▼▼▼ */
      #youtube-popup {
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        width: 85vw; max-width: 600px; aspect-ratio: 16/9;
        border-radius: 12px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.9);
        display: none; pointer-events: auto; z-index: 8500;
        background: #000;
      }
      #youtube-popup iframe { width: 100%; height: 100%; border: none; }

      @media (orientation: portrait) {
        #ui-landscape { display: none !important; }
        #ui-portrait { display: block !important; }
        #ui-portrait .scan-guide { top: max(10dvh, 70px); left: 50%; transform: translateX(-50%); }
        #ui-portrait .controls-panel { 
            bottom: max(12dvh, 120px); left: 50%; 
            transform: translateX(-50%) translateY(20px); 
            flex-direction: row; padding: 10px 25px; 
        }
        #ui-portrait .controls-panel.active { transform: translateX(-50%) translateY(0); }
        #ui-portrait .footer-frame { bottom: max(5dvh, 40px); left: 50%; transform: translateX(-50%); }
      }

      @media (orientation: landscape) {
        #ui-portrait { display: none !important; }
        #ui-landscape { display: block !important; }
        #ui-landscape .scan-guide { top: max(8dvh, 50px); left: 50%; transform: translateX(-50%); }
        #ui-landscape .controls-panel { 
            top: 50%; right: max(6dvw, 50px); 
            transform: translateY(-50%) translateX(20px); 
            flex-direction: column; padding: 25px 10px; gap: 15px;
        }
        #ui-landscape .controls-panel.active { transform: translateY(-50%) translateX(0); }
        #ui-landscape .footer-frame { bottom: max(8dvh, 40px); right: max(6dvw, 50px); }
      }
    </style>
  </head>
  <body>

    <div id="camera-frame"></div>
    <div id="camera-vignette">
        <div class="corner top-left"></div>
        <div class="corner top-right"></div>
        <div class="corner bottom-left"></div>
        <div class="corner bottom-right"></div>
    </div>

    <div id="loading"><div class="loader"></div><div id="loading-text">LOADING EXPERIENCE</div></div>
    
    <!-- ▼▼▼ YouTubeポップアップレイヤー ▼▼▼ -->
    <div id="youtube-popup">
      <iframe id="yt-player" src="https://www.youtube.com/embed/ORi8EpA3k9Q?enablejsapi=1&rel=0&playsinline=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>

    <div id="ui-portrait" class="ui-layer">
      <div class="scan-guide">アルバムを映してください</div>
      <div class="controls-panel">
        <button class="ctrl-btn ctrl-btn-stroke" onclick="globalPrev()"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></svg></button>
        <button class="ctrl-btn play-pause-btn" onclick="globalTogglePlay()"></button>
        <button class="ctrl-btn ctrl-btn-stroke" onclick="globalNext()"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"></polyline></svg></button>
      </div>
      <div class="footer-frame">
        <a href="https://example.com" target="_blank" rel="noopener noreferrer">
          <div class="footer-text">1,000+days of rasonance</div>
        </a>
      </div>
    </div>

    <div id="ui-landscape" class="ui-layer">
      <div class="scan-guide">アルバムを映してください</div>
      <div class="controls-panel">
        <button class="ctrl-btn ctrl-btn-stroke" onclick="globalPrev()"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></svg></button>
        <button class="ctrl-btn play-pause-btn" onclick="globalTogglePlay()"></button>
        <button class="ctrl-btn ctrl-btn-stroke" onclick="globalNext()"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"></polyline></svg></button>
      </div>
      <div class="footer-frame">
        <a href="https://example.com" target="_blank" rel="noopener noreferrer">
          <div class="footer-text">1,000+days of rasonance</div>
        </a>
      </div>
    </div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; uiError:yes; uiLoading:no; filterMinCF:0.0001; filterBeta: 0.001;" 
      color-space="sRGB" 
      renderer="colorManagement: true; antialias: true;" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false"
      gesture-detector>
      
      <a-assets>
        <img id="slide1-1" src="./slide1-1.jpg" />
        <img id="slide1-2" src="./slide1-2.jpg" />
        <img id="slide1-3" src="./slide1-3.jpg" />
        <img id="slide1-4" src="./slide1-4.jpg" />
        <img id="slide1-5" src="./slide1-5.jpg" />
        <img id="slide1-6" src="./slide1-6.jpg" />
        <img id="slide1-7" src="./slide1-7.jpg" />
        <img id="slide1-8" src="./slide1-8.jpg" />
        <img id="slide1-9" src="./slide1-9.jpg" />
        <img id="slide1-10" src="./slide1-10.jpg" />
        <img id="slide1-11" src="./slide1-11.jpg" />
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <!-- ▼▼▼ 修正の要：安全なコンポーネント方式に変更 ▼▼▼ -->
      <a-entity mindar-image-target="targetIndex: 0" target-handler="type: youtube"></a-entity>

      <a-entity mindar-image-target="targetIndex: 1" target-handler="type: slideshow; targetId: slideshow-2">
        <a-image id="slideshow-2" position="0 0 0" auto-slideshow="prefix: slide1; interval: 3500"></a-image>
      </a-entity>

    </a-scene>

    <script>
      const loadingDiv = document.getElementById('loading');
      const sceneEl = document.querySelector('a-scene');

      sceneEl.addEventListener('arReady', () => { hideLoading(); });
      sceneEl.addEventListener('arError', () => { hideLoading(); alert("カメラにアクセスできませんでした。"); });
      setTimeout(() => { hideLoading(); }, 10000);

      function hideLoading() {
        if(loadingDiv.style.display !== 'none') {
            loadingDiv.style.opacity = 0;
            setTimeout(() => { loadingDiv.style.display = 'none'; }, 500);
        }
      }
    </script>
  </body>
</html>
